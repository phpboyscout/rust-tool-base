name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
      # `--all-features` activates `credentials-linux-persistent`, which
      # pulls in `libdbus-sys` for Secret Service. `ubuntu-latest` doesn't
      # ship dbus headers, so install them before linting.
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - run: cargo clippy --workspace --all-targets --all-features

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      # Linux: `--all-features` activates `credentials-linux-persistent`,
      # which needs libdbus-1-dev for Secret Service.
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - if: runner.os == 'Linux'
        run: cargo nextest run --workspace --all-features
      # macOS / Windows: default features — `credentials-linux-persistent`
      # is a Linux-only feature and not relevant.
      - if: runner.os != 'Linux'
        run: cargo nextest run --workspace

  integration-tests:
    # Runs crates gated behind `--features integration`. These require
    # Docker (via testcontainers) and therefore only run on Linux where
    # GitHub Actions provides a Docker daemon out of the box. Gitea
    # container startup is ~5–10s so we lightly cache compiled deps.
    name: integration-tests (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - run: cargo nextest run -p rtb-vcs --features integration

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  coverage:
    name: coverage (≥70%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: llvm-tools-preview }
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      # Use `nextest` so each test runs in its own process. A handful of
      # `rtb-error` tests install global hook state and would race under
      # stock `cargo test`'s in-process parallelism.
      - run: cargo llvm-cov nextest --workspace --all-features --lcov --output-path lcov.info
      - run: cargo llvm-cov report --fail-under-lines 70
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-lcov
          path: lcov.info
