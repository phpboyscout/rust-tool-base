name: dependabot-automerge

# Auto-enable merge on Dependabot PRs that bump patch-level versions.
# Minor and major bumps still require manual review — a maintainer must
# judge whether the upstream diff is safe to ship. Branch protection on
# the target branch should require green CI so `gh pr merge --auto`
# waits for checks before merging.

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions: read-all

jobs:
  automerge:
    runs-on: ubuntu-latest
    # Only dependabot PRs. A compromised automerge workflow should not
    # be able to merge human PRs.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      # Needed to call `gh pr merge --auto` on the PR.
      contents: write
      pull-requests: write
    steps:
      - name: Fetch dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for patch bumps
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --rebase "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
