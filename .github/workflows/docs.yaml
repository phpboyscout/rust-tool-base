name: Documentation

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "docs/**"
      - "zensical.toml"
      - "requirements-lock.txt"
      - ".github/workflows/docs.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; cancel in-flight runs against the same
# ref so a rapid push sequence doesn't interleave.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build microsite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # docs build is read-only; deploy-pages uses its own
          # id-token mechanism, not git push, so GITHUB_TOKEN need not
          # persist. Mirrors go-tool-base's security audit remediation.
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      # Transitive deps pinned by hash via requirements-lock.txt.
      # Runner is single-use so plain pip install is sufficient;
      # local dev setups should use pipx (see requirements-lock.txt
      # header for the incantation).
      - run: pip install --require-hashes -r requirements-lock.txt

      - run: zensical build --clean

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    # Only deploy on push to main — PRs build to verify, but don't
    # publish.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        id: deployment
