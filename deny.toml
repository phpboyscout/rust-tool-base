# cargo-deny configuration.
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Advisories waived explicitly. Every waiver points at a deferred stub
# crate that will be reworked before its ship milestone (see
# `docs/development/specs/rust-tool-base.md` В§16 Roadmap). Lift each
# waiver when the owning crate lands its v0.1.
ignore = [
    # в”Ђв”Ђ unmaintained (no CVE) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    # `instant` вЂ” reached via async-openai в†’ backoff в†’ rtb-ai (v0.3).
    "RUSTSEC-2024-0384",
    # `backoff` вЂ” reached via async-openai в†’ rtb-ai (v0.3).
    "RUSTSEC-2025-0012",
    # `derivative` вЂ” reached via jsonschema в†’ fancy-regex в†’ rtb-ai (v0.3).
    "RUSTSEC-2024-0388",
    # `paste` вЂ” reached via ratatui в†’ rtb-docs (v0.2) / rtb-tui (v0.4).
    "RUSTSEC-2024-0436",
    # `number_prefix` вЂ” reached via self_update в†’ indicatif в†’ rtb-update (v0.2).
    "RUSTSEC-2025-0119",
    # `yaml-rust` вЂ” unmaintained; reached via `syntect` в†’ `tui-markdown`
    # в†’ `rtb-docs`. `tui-markdown` 0.3 is the only upstream `ratatui`
    # markdown renderer with a compatible API; we'll revisit when a
    # syntect upgrade (or a tui-markdown successor) stops pulling
    # yaml-rust 0.4.
    "RUSTSEC-2024-0320",
    # `bincode 1.3.3` вЂ” upstream ceased development; reached via
    # `syntect` в†’ `tui-markdown` в†’ `rtb-docs`. Same upgrade path as
    # RUSTSEC-2024-0320 lifts this.
    "RUSTSEC-2025-0141",
    # `rustls-pemfile` вЂ” archived; reached via `bollard` в†’
    # `testcontainers` в†’ rtb-vcs integration tests. Waived until
    # `testcontainers` ships a release on `rustls-pki-types`'
    # `PemObject` API (tracked upstream in testcontainers-rs).
    "RUSTSEC-2025-0134",
    # в”Ђв”Ђ vulnerability в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    # `gix-date < 0.12` вЂ” `TimeBuf::as_str` can yield non-utf8 strings.
    # Reached via gix в†’ rtb-vcs (v0.5 target, currently a 19-line stub
    # that never constructs a `TimeBuf`). Waived until the gix upgrade
    # lands with rtb-vcs v0.1; bumping gix to 0.81 today requires
    # threading `sha1`/`sha256` features through `gix-hash`, which is
    # scoped with the rtb-vcs rewrite.
    { id = "RUSTSEC-2025-0140", reason = "gix-date via gix is a stub dependency; rtb-vcs v0.5 will upgrade" },
]

[licenses]
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
    # Community Data License вЂ” used by webpki-roots for the root-cert store.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
